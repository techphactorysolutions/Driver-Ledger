<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DriveLedger</title>
  <meta name="robots" content="noindex" />
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07111f;color:#e6edf7;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.card{max-width:460px;padding:28px;border:1px solid rgba(255,255,255,.12);border-radius:24px;background:rgba(255,255,255,.06);text-align:center}a{color:#8fd8ff}</style>
</head>
<body>
  <main class="card">
    <h1>DriveLedger</h1>
    <p>Designed by Tech Phactory Solutions</p>
    <p>Opening the app…</p>
    <p><a href="./">Open DriveLedger</a></p>
  </main>
  <script>
    const parts = location.pathname.split('/').filter(Boolean);
    const base = parts.length ? '/' + parts[0] + '/' : '/';
    setTimeout(() => location.replace(base), 250);
  </script>
</body>
</html>
